<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Forecasting RAG</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <!-- Include local CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Include marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>
    
    <div class="app-container">
        <header>
            <h1>AI Data <span class="gradient-text">Forecaster</span></h1>
            <p>Retrieval-Augmented Generation using Google Gemini</p>
        </header>

        <div class="chat-container" id="chatContainer">
            <div class="message ai-message">
                <div class="avatar ai-avatar">AI</div>
                <div class="content">
                    <p>Hello! I am connected to the ETT forecasting knowledge base. Ask me any question related to time series models.</p>
                </div>
            </div>
        </div>

        <div class="input-container">
            <form id="chatForm">
                <input type="text" id="userInput" placeholder="Ask about Transformer models, ETT data, etc..." autocomplete="off" required>
                <button type="submit" id="sendBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <!-- Include local script -->
    <script src="script.js"></script>
</body>
</html>
